# ============================================================
#  zoo.cfg – Configuration ZooKeeper 3.7.0
#  Ensemble de 5 nœuds (tolère 2 pannes simultanées)
# ============================================================

# Durée d'un tick en ms (base de tous les timeouts)
tickTime=2000

# Nombre de ticks pour l'initialisation d'un follower
initLimit=10

# Nombre de ticks pour la sync leader/follower
syncLimit=5

# Répertoire de données ZooKeeper
dataDir=/opt/zookeeper/data

# Répertoire de logs ZooKeeper
dataLogDir=/opt/zookeeper/logs

# Port client ZooKeeper
clientPort=2181

# Nombre maximum de connexions client
maxClientCnxns=60

# Purge automatique des snapshots
autopurge.snapRetainCount=3
autopurge.purgeInterval=1

# Définition des serveurs du cluster
# server.<myid>=<hostname>:<port_follower>:<port_election>
server.1=srvmaster01:2888:3888
server.2=srvmaster02:2888:3888
server.3=srvdata01:2888:3888
server.4=srvdata02:2888:3888
server.5=srvdata03:2888:3888

# Interface d'écoute
4lw.commands.whitelist=mntr,conf,ruok,stat,srvr,isro,envi
